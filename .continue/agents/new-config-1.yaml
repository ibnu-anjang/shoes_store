name: Local Ollama Config
version: 1.0.0
schema: v1

models:
  # Model utama untuk Coding & Autocomplete (ringan & cepat)
  - name: Qwen Coder 3B Local
    provider: ollama
    model: qwen2.5-coder:3b
    roles:
      - chat
      - edit
      - apply
      - autocomplete
    defaultCompletionOptions:
      temperature: 0.7
      contextLength: 8192   # jangan terlalu besar biar hemat RAM